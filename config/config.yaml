# ── Strategies (الاستراتيجيات) ────────────────────────────────
strategies:
  aggressive_daily:
    enabled: true
    timeframe: "1m"
    target_pct: 1.5
    stop_loss_pct: 0.8
    min_confidence: 0.50
    description: "صفقات يومية سريعة 1-3%"

  short_waves:
    enabled: true
    timeframe: "5m"
    target_pct: 5.0
    stop_loss_pct: 2.0
    min_confidence: 0.55
    description: "موجات قصيرة 1-7 أيام"

  medium_waves:
    enabled: true
    timeframe: "15m"
    target_pct: 10.0
    stop_loss_pct: 3.0
    min_confidence: 0.60
    description: "موجات متوسطة 1-2 أسبوع"

  price_explosions:
    enabled: true
    timeframe: "1m"
    target_pct: 15.0
    stop_loss_pct: 4.0
    min_confidence: 0.75
    description: "انفجارات سعرية نادرة 15%+"

