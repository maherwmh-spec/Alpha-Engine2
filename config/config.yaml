  liquidity:
    min_avg_volume: 100000
    lookback_days: 20
  volatility:
    max_gap_pct: 10.0
    min_price: 2.0
    max_price: 500.0

# ── Logging ────────────────────────────────────────────────
logging:
  level: "INFO"
  rotation: "1 day"
  retention: "30 days"

